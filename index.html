<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Карточки */
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        /* Список статусов (кнопки) */
        .status-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .status-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .status-btn:hover {
            border-color: #007bff;
            background: #f0f7ff;
        }

        .status-btn.active {
            background: #007bff;
            border-color: #007bff;
            color: white;
        }

        /* Пользователи */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .user-status {
            font-size: 13px;
            color: #666;
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Кнопка сохранения */
        .save-btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #0056b3;
        }

        /* Кнопка входа через Google */
        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #007bff;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #5a6268;
        }

        /* Инфо */
        .my-info {
            background: #e8f4fd;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0056b3;
        }

        /* Скрытый контент */
        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        /* Адаптив */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            .status-buttons { gap: 8px; }
            .status-btn { padding: 8px 16px; font-size: 13px; }
            .user-item { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Блок входа -->
        <div id="loginBlock" class="card">
            <h2>🔐 Вход в систему</h2>
            <button class="google-btn" id="googleSignInBtn">
                🚀 Войти через Google
            </button>
            <div style="font-size: 13px; color: #666; text-align: center; margin-top: 12px;">
                Используйте свой Google аккаунт для входа
            </div>
        </div>

        <!-- Основной контент (скрыт до входа) -->
        <div id="mainContent" class="hidden">
            <!-- Карточка профиля -->
            <div class="card">
                <h2>👤 Мой профиль</h2>
                <div class="my-info" id="myInfo">Загрузка...</div>
                
                <h3>Выберите статус:</h3>
                <div class="status-buttons" id="statusButtons">
                    <button class="status-btn" data-status="Онлайн">🟢 Онлайн</button>
                    <button class="status-btn" data-status="Отошёл">☕ Отошёл</button>
                    <button class="status-btn" data-status="Не беспокоить">🔴 Не беспокоить</button>
                    <button class="status-btn" data-status="Встреча">📅 Встреча</button>
                    <button class="status-btn" data-status="Обед">🍜 Обед</button>
                </div>
                
                <button class="save-btn" id="saveStatusBtn">Сохранить статус</button>
                <button class="logout-btn" id="logoutBtn">Выйти из аккаунта</button>
                <button class="reset-btn" id="resetBtn">Сбросить сессию</button>
            </div>

            <!-- Карточка монитора группы -->
            <div class="card">
                <h2>👥 Монитор группы</h2>
                <div class="user-list" id="groupList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ========== ПОДСТАВЬТЕ СВОИ ДАННЫЕ ==========
        const SUPABASE_URL = 'https://qtgazbjettbxlgqllxnm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9EoTAUgvBlzPijh212ML3Q_a3gO9efn';
        // ============================================

        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSelectedStatus = 'Онлайн';
        let currentUser = null;
        let autoUpdateInterval = null;

        // Функция входа через Google
        async function signInWithGoogle() {
            try {
                // Получаем текущий URL без hash и query параметров
                const currentUrl = window.location.origin + window.location.pathname;
                
                console.log('Начинаем вход через Google, редирект на:', currentUrl);
                
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: currentUrl,
                        skipBrowserRedirect: false
                    }
                });
                
                if (error) {
                    console.error('Ошибка входа:', error);
                    alert('Ошибка входа: ' + error.message);
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Ошибка: ' + err.message);
            }
        }

        // Функция выхода
        async function signOut() {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) {
                    console.error('Ошибка выхода:', error);
                    alert('Ошибка выхода: ' + error.message);
                } else {
                    // Очищаем интервал
                    if (autoUpdateInterval) {
                        clearInterval(autoUpdateInterval);
                        autoUpdateInterval = null;
                    }
                    // Перезагружаем страницу
                    window.location.href = window.location.pathname;
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        // Функция сброса сессии
        async function resetSession() {
            try {
                await supabase.auth.signOut();
                localStorage.clear();
                sessionStorage.clear();
                if (autoUpdateInterval) {
                    clearInterval(autoUpdateInterval);
                    autoUpdateInterval = null;
                }
                window.location.href = window.location.pathname;
            } catch (err) {
                console.error('Ошибка сброса:', err);
                window.location.href = window.location.pathname;
            }
        }

        // Функция создания/обновления профиля пользователя
        async function createOrUpdateProfile(user) {
            if (!user) return null;

            try {
                // Проверяем, существует ли профиль
                const { data: existingProfile, error: fetchError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .maybeSingle();

                if (fetchError) {
                    console.error('Ошибка проверки профиля:', fetchError);
                    return null;
                }

                if (!existingProfile) {
                    // Создаём новый профиль
                    const userName = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
                    const { data: newProfile, error: insertError } = await supabase
                        .from('profiles')
                        .insert([
                            { 
                                id: user.id, 
                                username: userName,
                                email: user.email,
                                status: 'Онлайн',
                                color: '#007bff'
                            }
                        ])
                        .select()
                        .single();

                    if (insertError) {
                        console.error('Ошибка создания профиля:', insertError);
                        return null;
                    }
                    console.log('Создан новый профиль для:', userName);
                    return newProfile;
                }

                return existingProfile;
            } catch (err) {
                console.error('Ошибка в createOrUpdateProfile:', err);
                return null;
            }
        }

        // Функция обновления статуса
        async function updateStatus() {
            if (!currentUser) {
                alert('Пожалуйста, войдите в систему');
                return;
            }

            try {
                const { error } = await supabase
                    .from('profiles')
                    .update({ status: currentSelectedStatus })
                    .eq('id', currentUser.id);

                if (error) {
                    console.error('Ошибка:', error);
                    alert('Ошибка обновления: ' + error.message);
                } else {
                    alert('✅ Статус обновлён!');
                    await loadGroup();
                    await loadMyInfo();
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        // Загрузка информации о текущем пользователе
        async function loadMyInfo() {
            if (!currentUser) return;

            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .maybeSingle();

                if (error) {
                    console.error('Ошибка загрузки информации:', error);
                    document.getElementById('myInfo').innerHTML = `⚠️ Ошибка загрузки профиля`;
                    return;
                }

                if (data) {
                    document.getElementById('myInfo').innerHTML = `
                        👋 Вы зашли как: <strong>${escapeHtml(data.username)}</strong><br>
                        📧 ${escapeHtml(currentUser.email)}<br>
                        📌 Текущий статус: ${escapeHtml(data.status || 'не задан')}
                    `;
                    
                    // Устанавливаем активную кнопку статуса
                    if (data.status) {
                        document.querySelectorAll('.status-btn').forEach(btn => {
                            if (btn.getAttribute('data-status') === data.status) {
                                btn.classList.add('active');
                                currentSelectedStatus = data.status;
                            } else {
                                btn.classList.remove('active');
                            }
                        });
                    }
                }
            } catch (err) {
                console.error('Ошибка в loadMyInfo:', err);
            }
        }

        // Загрузка всех пользователей
        async function loadGroup() {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('username', { ascending: true });

                if (error) {
                    console.error('Ошибка загрузки:', error);
                    document.getElementById('groupList').innerHTML = '<div style="color: red;">Ошибка загрузки. Проверьте RLS.</div>';
                    return;
                }

                if (!data || data.length === 0) {
                    document.getElementById('groupList').innerHTML = '<div style="color: #999;">Нет пользователей</div>';
                    return;
                }

                const listHtml = data.map(user => `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="status-dot" style="background: ${user.color || '#007bff'}"></div>
                            <span class="user-name">${escapeHtml(user.username || 'Без имени')}</span>
                            ${user.email ? `<span style="font-size: 11px; color: #999;">(${escapeHtml(user.email)})</span>` : ''}
                        </div>
                        <span class="user-status">${escapeHtml(user.status || 'Статус не задан')}</span>
                    </div>
                `).join('');

                document.getElementById('groupList').innerHTML = listHtml;
            } catch (err) {
                console.error('Ошибка в loadGroup:', err);
            }
        }

        // Проверка и обработка сессии при загрузке
        async function checkAuth() {
            try {
                // Очищаем hash из URL если есть (токены от Google)
                if (window.location.hash && window.location.hash.includes('access_token')) {
                    console.log('Очищаем hash из URL');
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                
                // Получаем текущую сессию
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('Ошибка проверки сессии:', error);
                    showLoginBlock();
                    return;
                }

                if (session && session.user) {
                    currentUser = session.user;
                    console.log('Пользователь авторизован:', currentUser.email);
                    
                    // Создаём или обновляем профиль
                    await createOrUpdateProfile(currentUser);
                    
                    // Показываем основной контент
                    document.getElementById('loginBlock').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    
                    // Загружаем данные
                    await loadMyInfo();
                    await loadGroup();
                    
                    // Запускаем автообновление
                    if (autoUpdateInterval) {
                        clearInterval(autoUpdateInterval);
                    }
                    autoUpdateInterval = setInterval(loadGroup, 5000);
                } else {
                    console.log('Пользователь не авторизован');
                    showLoginBlock();
                }
            } catch (err) {
                console.error('Ошибка в checkAuth:', err);
                showLoginBlock();
            }
        }
        
        function showLoginBlock() {
            document.getElementById('loginBlock').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
            }
        }

        // Защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            // Кнопка входа через Google
            const googleBtn = document.getElementById('googleSignInBtn');
            if (googleBtn) {
                googleBtn.addEventListener('click', signInWithGoogle);
            }
            
            // Кнопка сохранения статуса
            const saveBtn = document.getElementById('saveStatusBtn');
            if (saveBtn) {
                saveBtn.addEventListener('click', updateStatus);
            }
            
            // Кнопка выхода
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', signOut);
            }
            
            // Кнопка сброса
            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', resetSession);
            }
            
            // Кнопки выбора статуса
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSelectedStatus = btn.getAttribute('data-status');
                });
            });
            
            // По умолчанию активен "Онлайн"
            const defaultBtn = document.querySelector('.status-btn[data-status="Онлайн"]');
            if (defaultBtn) {
                defaultBtn.classList.add('active');
            }
        }

        // Слушаем изменения состояния аутентификации
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event);
            
            if (event === 'SIGNED_IN' && session) {
                currentUser = session.user;
                window.location.reload();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                showLoginBlock();
            }
        });

        // Инициализация приложения
        function init() {
            setupEventListeners();
            checkAuth();
        }
        
        // Запускаем приложение
        init();
    </script>
</body>
</html>
