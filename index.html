<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Монитор группы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            cursor: pointer;
        }
        .status-item:hover {
            background: #e0e0e0;
        }
        .status-item.active {
            background: #d4edda;
            border-left: 4px solid green;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .user-name {
            font-weight: bold;
        }
        .user-status {
            color: #666;
            font-size: 14px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        h3 {
            margin-top: 0;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>📋 Мой профиль</h3>
        <p>Вы зашли как: <strong id="myName">Almas</strong></p>
        <div class="status-list" id="myStatusList">
            <div class="status-item" data-status="Учусь">📚 Учусь</div>
            <div class="status-item" data-status="Кофе">☕ Кофе</div>
            <div class="status-item" data-status="В игре">🎮 В игре</div>
            <div class="status-item" data-status="Дома">🏠 Дома</div>
        </div>
        <button onclick="saveMyStatus()">Сохранить статус</button>
    </div>

    <div class="card">
        <h3>👥 Монитор группы</h3>
        <div id="groupList">
            <!-- Тут будут пользователи -->
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabase = createClient(
            'https://merchgizzyhobvdopml.supabase.co',
            'sb_publishable_Thft5GubEakf8fyndIITtg_00iN05yh'
        );

        const MY_ID = '02d2fdbf-329b-480c-a424-37670b045f1b';
        let selectedStatus = 'Учусь';

        // Выбор статуса
        document.querySelectorAll('.status-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.status-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                selectedStatus = item.getAttribute('data-status');
            });
        });

        // Сохранить статус
        window.saveMyStatus = async () => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: selectedStatus })
                .eq('id', MY_ID);
            
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('Статус обновлён!');
                loadGroup();
            }
        };

        // Загрузить группу
        async function loadGroup() {
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .order('username');

            if (data) {
                const container = document.getElementById('groupList');
                container.innerHTML = data.map(user => `
                    <div class="user-item">
                        <div>
                            <span class="dot" style="background: ${user.color || '#ccc'}"></span>
                            <span class="user-name">${user.username}</span>
                        </div>
                        <div class="user-status">${user.status || 'Статус не задан'}</div>
                    </div>
                `).join('');

                // Показать свое имя
                const me = data.find(u => u.id === MY_ID);
                if (me) {
                    document.getElementById('myName').innerText = me.username;
                }
            }
        }

        loadGroup();
        setInterval(loadGroup, 5000);
    </script>
</body>
</html>
