<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Статусы</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .user { padding: 10px; margin: 5px 0; background: #f0f0f0; border-radius: 5px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        select, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>

    <h3>Мой статус</h3>
    <select id="status">
        <option>Онлайн</option>
        <option>Отошел</option>
        <option>Не беспокоить</option>
    </select>
    <input type="color" id="color" value="#00ff00">
    <button onclick="updateStatus()">Обновить</button>

    <h3>Пользователи</h3>
    <div id="list"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabase = createClient(
            'https://merchgizzyhobvdopml.supabase.co',
            'sb_publishable_Thft5GubEakf8fyndIITtg_00iN05yh'
        );

        const MY_ID = '4bc569de-89f8-47d9-9b60-2d8bd2439122';

        window.updateStatus = async () => {
            await supabase
                .from('profiles')
                .update({ 
                    status: document.getElementById('status').value,
                    color: document.getElementById('color').value 
                })
                .eq('id', MY_ID);
            loadUsers();
        };

        async function loadUsers() {
            const { data } = await supabase
                .from('profiles')
                .select('*')
                .order('username');
            
            const list = document.getElementById('list');
            list.innerHTML = data.map(user => `
                <div class="user">
                    <div class="dot" style="background: ${user.color || '#ccc'}"></div>
                    <strong>${user.username}</strong>
                    <span>${user.status || 'Нет статуса'}</span>
                </div>
            `).join('');
        }

        loadUsers();
        setInterval(loadUsers, 3000);
    </script>
</body>
</html>
