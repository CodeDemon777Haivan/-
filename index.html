<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Статусы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 8px;
            gap: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        #myInfo {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        select, button {
            padding: 8px 12px;
            font-size: 14px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="myInfo"></div>
    <div class="controls">
        <select id="statusSelect">
            <option value="Онлайн">Онлайн</option>
            <option value="Отошел">Отошел</option>
            <option value="Не беспокоить">Не беспокоить</option>
            <option value="Оффлайн">Оффлайн</option>
        </select>
        <input type="color" id="colorPicker" value="#00ff00">
        <button onclick="changeStatus()">Изменить статус</button>
    </div>
    <h3>Список пользователей:</h3>
    <div id="groupList"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const URL = 'https://merchgizzyhobvdopml.supabase.co';
        const KEY = 'sb_publishable_Thft5GubEakf8fyndIITtg_00iN05yh';
        const supabase = createClient(URL, KEY);

        const ME_ID = '02d2fdbf-329b-480c-a424-37670b045f1b';

        window.changeStatus = async () => {
            const status = document.getElementById('statusSelect').value;
            const color = document.getElementById('colorPicker').value;

            const { error } = await supabase
                .from('profiles')
                .update({ status: status, color: color })
                .eq('id', ME_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong>
                        <br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === ME_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
